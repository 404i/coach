services:
  coach:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garmin-ai-coach
    ports:
      - "8088:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234/v1}
      - LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS:-5000}
      - ENABLE_RULE_BASED_FALLBACK=${ENABLE_RULE_BASED_FALLBACK:-true}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID}
      - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET}
      - STRAVA_REFRESH_TOKEN=${STRAVA_REFRESH_TOKEN}
      - GARMIN_ACTIVITY_DB_PATH=${GARMIN_ACTIVITY_DB_PATH:-/app/data/garmin/HealthData/DBs/garmin_activities.db}
      - DB_PATH=/app/data/coach.db
      - TZ=${TZ:-UTC}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── MCP HTTP Server ──────────────────────────────────────────────────────────
  # Exposes the MCP server over SSE on the local network with bearer-token auth.
  # Requires MCP_AUTH_TOKEN in your .env (generate: openssl rand -hex 32)
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: garmin-ai-coach-mcp
    ports:
      - "${MCP_BIND_HOST:-0.0.0.0}:${MCP_PORT:-3001}:3001"
    volumes:
      - ./mcp/memories:/app/mcp/memories
    environment:
      - MCP_HTTP_MODE=true
      - MCP_PORT=3001
      - MCP_BIND_HOST=0.0.0.0
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_RATE_LIMIT=${MCP_RATE_LIMIT:-60}
      - MCP_ALLOWED_IPS=${MCP_ALLOWED_IPS:-}
      - COACH_API_URL=http://coach:8080
      - TZ=${TZ:-UTC}
    depends_on:
      coach:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Development frontend (optional, comment out in production)
  frontend-dev:
    image: node:20-alpine
    container_name: garmin-coach-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8080
    profiles:
      - dev

volumes:
  data:
  logs:
