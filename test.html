<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach App Diagnostic</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
    .pass { background: #d4edda; }
    .fail { background: #f8d7da; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    #output { white-space: pre-wrap; background: #f5f5f5; padding: 10px; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Coach App Diagnostic Test</h1>
  
  <div class="test">
    <h2>1. Module Loading Test</h2>
    <button onclick="testModules()">Test Modules</button>
    <div id="module-result"></div>
  </div>
  
  <div class="test">
    <h2>2. LocalStorage Test</h2>
    <button onclick="testLocalStorage()">Test Storage</button> 
    <div id="storage-result"></div>
  </div>
  
  <div class="test">
    <h2>3. DOM Elements Test</h2>
    <button onclick="testDOM()">Test DOM</button>
    <div id="dom-result"></div>
  </div>
  
  <div class="test">
    <h2>4. Event Listener Test</h2>
    <button id="test-button" onclick="testEventListener()">Click Me!</button>
    <div id="event-result"></div>
  </div>
  
  <div id="output"></div>
  
  <!-- Load modules -->
  <script src="utils/formatters.js"></script>
  <script src="storage/local-storage.js"></script>
  <script src="engine/recovery-scoring.js"></script>
  <script src="engine/gap-detection.js"></script>
  <script src="engine/workout-planning.js"></script>
  
  <script>
    const output = document.getElementById('output');
    
    function log(msg) {
      output.textContent += msg + '\n';
      console.log(msg);
    }
    
    function testModules() {
      const result = document.getElementById('module-result');
      log('\n=== Testing Module Loading ===');
      
      const tests = [
        { name: 'CoachStorage', obj: window.CoachStorage },
        { name: 'CoachUtils', obj: window.CoachUtils },
        { name: 'scoreRecovery', obj: window.scoreRecovery },
        { name: 'detectGaps', obj: window.detectGaps },
        { name: 'chooseWorkout', obj: window.chooseWorkout }
      ];
      
      let allPass = true;
      tests.forEach(test => {
        const exists = typeof test.obj !== 'undefined';
        log(`${exists ? '✅' : '❌'} ${test.name}: ${typeof test.obj}`);
        if (!exists) allPass = false;
      });
      
      result.className = 'test ' + (allPass ? 'pass' : 'fail');
      result.textContent = allPass ? '✅ All modules loaded' : '❌ Some modules missing';
    }
    
    function testLocalStorage() {
      const result = document.getElementById('storage-result');
      log('\n=== Testing LocalStorage ===');
      
      try {
        // Test write
        localStorage.setItem('coach_test', JSON.stringify({test: true}));
        log('✅ Write test passed');
        
        // Test read
        const data = JSON.parse(localStorage.getItem('coach_test'));
        log('✅ Read test passed: ' + JSON.stringify(data));
        
        // Test delete
        localStorage.removeItem('coach_test');
        log('✅ Delete test passed');
        
        result.className = 'test pass';
        result.textContent = '✅ LocalStorage working';
      } catch (e) {
        log('❌ LocalStorage error: ' + e.message);
        result.className = 'test fail';
        result.textContent = '❌ LocalStorage failed: ' + e.message;
      }
    }
    
    function testDOM() {
      const result = document.getElementById('dom-result');
      log('\n=== Testing DOM Elements ===');
      
      // Create a test element
      const testDiv = document.createElement('div');
      testDiv.id = 'test-element';
      testDiv.textContent = 'Test Element';
      document.body.appendChild(testDiv);
      
      // Try to find it
      const found = document.getElementById('test-element');
      const success = found !== null;
      
      log(success ? '✅ DOM manipulation working' : '❌ DOM manipulation failed');
      
      // Cleanup
      if (found) found.remove();
      
      result.className = 'test ' + (success ? 'pass' : 'fail');
      result.textContent = success ? '✅ DOM working' : '❌ DOM failed';
    }
    
    function testEventListener() {
      const result = document.getElementById('event-result');
      log('\n=== Button Clicked! ===');
      log('✅ Event listeners working');
      result.className = 'test pass';
      result.textContent = '✅ Event listener fired!';
    }
    
    // Auto-run tests on load
    window.addEventListener('DOMContentLoaded', () => {
      log('🚀 Page loaded at: ' + new Date().toISOString());
      log('Ready to run tests!');
    });
  </script>
</body>
</html>
