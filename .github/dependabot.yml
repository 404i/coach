version: 2
updates:
  # npm — backend
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # npm — mcp
  - package-ecosystem: "npm"
    directory: "/mcp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # npm — frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # pip — GarminDB runtime deps
  - package-ecosystem: "pip"
    directory: "/vendor/GarminDB"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # pip — Jupyter deps
  - package-ecosystem: "pip"
    directory: "/vendor/GarminDB/Jupyter"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
