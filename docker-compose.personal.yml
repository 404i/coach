# Docker Compose for Personal Use (with your existing data)
version: '3.8'

services:
  coach:
    image: 404i/garmin-coach-ai:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garmin-ai-coach-personal
    ports:
      - "8080:8080"
    volumes:
      # Mount your existing GarminDB data
      - ${GARMINDB_PATH:-~/HealthData}:/app/data/garmin/HealthData:ro
      # Mount your coach data
      - ./data:/app/data
      # Logs
      - ./logs:/app/logs
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234/v1}
      - LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS:-5000}
      - ENABLE_RULE_BASED_FALLBACK=${ENABLE_RULE_BASED_FALLBACK:-true}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # Strava (not currently used — Garmin is primary data source)
      # - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID}
      # - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET}
      # - STRAVA_REFRESH_TOKEN=${STRAVA_REFRESH_TOKEN}
      - GARMIN_ACTIVITY_DB_PATH=${GARMIN_ACTIVITY_DB_PATH:-/app/data/garmin/HealthData/DBs/garmin_activities.db}
      - TZ=${TZ:-UTC}
      - PROFILE_ID=${PROFILE_ID:-test-athlete-1}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  data:
  logs:

# NOTE: MCP Server runs locally, not in Docker
# Claude Desktop requires stdio-based MCP server running on host
# Use: node mcp/coach-mcp-server.js
# Configured in: ~/Library/Application Support/Claude/claude_desktop_config.json
